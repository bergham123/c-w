<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - WhatsApp Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* نفس الأنماط السابقة (محذوفة للاختصار) */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f172a; padding: 20px; }
        .auth-card { background: #111827; border: 1px solid #1f2937; border-radius: 18px; padding: 40px; width: 100%; max-width: 420px; }
        .auth-card .logo { text-align: center; margin-bottom: 30px; }
        .auth-card .logo h2 { color: #22c55e; font-size: 28px; }
        .auth-card .logo span { color: #94a3b8; font-size: 14px; }
        .auth-card h1 { font-size: 24px; margin-bottom: 8px; text-align: center; }
        .auth-card .subtitle { color: #94a3b8; text-align: center; margin-bottom: 25px; font-size: 14px; }
        .auth-card label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 5px; }
        .auth-card input { width: 100%; padding: 12px 16px; margin-bottom: 18px; border: 1px solid #1f2937; border-radius: 10px; background: #1e293b; color: #fff; font-size: 14px; outline: none; transition: border-color 0.3s; }
        .auth-card input:focus { border-color: #22c55e; }
        .auth-card input::placeholder { color: #64748b; }
        .auth-card .btn-primary { width: 100%; padding: 14px; background: #22c55e; border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s, transform 0.2s; }
        .auth-card .btn-primary:hover { background: #16a34a; transform: translateY(-2px); }
        .auth-card .btn-primary:disabled { background: #374151; cursor: not-allowed; transform: none; }
        .auth-card .footer-text { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 14px; }
        .auth-card .footer-text a { color: #22c55e; text-decoration: none; font-weight: 500; }
        .auth-card .footer-text a:hover { text-decoration: underline; }
        .auth-card .error-msg { background: #7f1d1d; color: #fca5a5; padding: 10px 14px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; display: none; }
        .auth-card .error-msg.show { display: block; }
        .auth-card .success-msg { background: #14532d; color: #86efac; padding: 10px 14px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; display: none; }
        .auth-card .success-msg.show { display: block; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <h2>WhatsApp</h2>
                <span>Dashboard</span>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Register to access the dashboard</p>
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            <form id="registerForm">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required />
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required />
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" required minlength="6" />
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password" required />
                <button type="submit" class="btn-primary" id="registerBtn">Register</button>
            </form>
            <p class="footer-text">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>
    <script>
        const form = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!username || !email || !password || !confirmPassword) {
                errorMsg.textContent = 'All fields are required.';
                errorMsg.classList.add('show');
                return;
            }
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.classList.add('show');
                return;
            }
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters.';
                errorMsg.classList.add('show');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Registering...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, confirmPassword })
                });
                const data = await res.json();
                if (res.ok) {
                    successMsg.textContent = 'Registration successful! Redirecting to login...';
                    successMsg.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    errorMsg.textContent = data.error || 'Registration failed.';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.add('show');
                console.error(err);
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Register';
            }
        });
    </script>
</body>
</html>
